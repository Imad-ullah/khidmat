services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-khidmatapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-khidmatapp_password}
      POSTGRES_DB: ${POSTGRES_DB:-khidmatapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - khidmatapp
    healthcheck:
      test:
        - CMD-SHELL
        - "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - khidmatapp
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: migrations
    image: ${DOCKER_IMAGE:-ghcr.io/your-org/khidmatapp-backend:latest}-migrations
    env_file:
      - ../../backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-khidmatapp}:${POSTGRES_PASSWORD:-khidmatapp_password}@postgres:5432/${POSTGRES_DB:-khidmatapp}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - khidmatapp
    profiles:
      - tools

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: production
    image: ${DOCKER_IMAGE:-ghcr.io/your-org/khidmatapp-backend:latest}
    restart: unless-stopped
    env_file:
      - ../../backend/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-khidmatapp}:${POSTGRES_PASSWORD:-khidmatapp_password}@postgres:5432/${POSTGRES_DB:-khidmatapp}?schema=public
      REDIS_URL: redis://redis:6379
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - khidmatapp
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"fetch('http://127.0.0.1:4000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-api.khidmatapp.pk}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - khidmatapp

  certbot:
    image: certbot/certbot:v2.11.0
    restart: unless-stopped
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - khidmatapp

networks:
  khidmatapp:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_certs:
